<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair Wizard | Ibrahim Khalil Customs Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #010409;
            --neon-cyan: #00f3ff;
            --text-muted: #8b949e;
            --card-bg: #0d1117;
            --border-color: rgba(0, 243, 255, 0.1);
            --accent-glow: rgba(0, 243, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0, 243, 255, 0.05), transparent);
        }

        h1, h2, h3, .total-label, .total-value {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            width: 100%;
        }

        .calculator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .calculator-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Input HUD */
        .input-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: 16px;
            position: relative;
        }

        .input-section::before {
            content: 'INPUT_MODULE';
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--bg-deep);
            padding: 0 10px;
            font-family: 'Orbitron';
            font-size: 0.6rem;
            color: var(--neon-cyan);
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            background: #161b22;
            border: 1px solid var(--border-color);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .btn-calc {
            width: 100%;
            background: var(--neon-cyan);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .btn-calc:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
        }

        /* Receipt HUD */
        .receipt-section {
            background: rgba(0, 243, 255, 0.02);
            border: 1px dashed var(--border-color);
            padding: 2rem;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 400px;
        }

        .receipt-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .line-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .line-label {
            color: var(--text-muted);
        }

        .line-value {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        .total-container {
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            margin-top: auto;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1rem;
        }

        .total-label {
            font-size: 0.7rem;
            color: var(--neon-cyan);
        }

        .total-value {
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .iqd-value {
            font-size: 1rem;
            color: var(--text-muted);
            text-align: right;
        }

        .status-bar {
            margin-top: auto;
            padding: 1rem 2rem;
            font-size: 0.6rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 243, 255, 0.1);
            opacity: 0.5;
            z-index: 1000;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <header>
        <div class="logo">REPAIR WIZARD // IBRAHIM_KHALIL_CUSTOMS</div>
        <div style="font-size: 0.6rem; color: var(--text-muted); font-family: 'Orbitron';">
            BORDER_PROTOCOL: <span style="color: var(--neon-cyan)">ACTIVE</span>
        </div>
    </header>

    <div class="container">
        <div class="calculator-grid">
            <!-- Input HUD -->
            <div class="input-section">
                <div class="form-group">
                    <label>Vehicle Year / Make</label>
                    <input type="text" id="vehicleInfo" placeholder="e.g. 2022 TOYOTA CAMRY">
                </div>
                <div class="form-group">
                    <label>Origin Port</label>
                    <select id="origin">
                        <option value="USA">USA (COPART/IAAI)</option>
                        <option value="DUBAI">DUBAI (JEBEL ALI)</option>
                        <option value="EU">EUROPE</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Purchase Price (USD)</label>
                    <input type="number" id="price" placeholder="0.00">
                </div>
                <button class="btn-calc" onclick="calculateFees()">Calculate Border Fees</button>
            </div>

            <!-- Receipt HUD -->
            <div class="receipt-section" id="receipt">
                <div>
                    <div class="receipt-header">
                        <h3 style="font-size: 0.8rem; color: var(--neon-cyan);">Digital Clearance HUD</h3>
                        <p style="font-size: 0.6rem; color: var(--text-muted); margin-top: 4px;">ID: IK-BORDER-SCAN-882</p>
                    </div>
                    
                    <div id="receiptContent">
                        <div style="text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 4rem;">
                            AWAITING INPUT DATA...
                        </div>
                    </div>
                </div>

                <div class="total-container" id="totalContainer" style="display: none;">
                    <div class="total-row">
                        <span class="total-label">Total Clearance Cost</span>
                        <span class="total-value" id="totalUSD">$0.00</span>
                    </div>
                    <div class="iqd-value" id="totalIQD">0 IQD</div>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span>GATEWAY: ZAKHO_IK_BORDER</span>
        <span>EXCHANGE_RATE: 1 USD = 1,500 IQD</span>
        <span>© 2026 REPAIRWIZARD.NET</span>
    </div>

    <script>
        const EXCHANGE_RATE = 1500;
        const KRG_DUTY_RATE = 0.07;
        const ASYCUDA_FEE = 150;
        const FEDERAL_TRANSIT_TAX = 300;

        function calculateFees() {
            const price = parseFloat(document.getElementById('price').value);
            const vehicle = document.getElementById('vehicleInfo').value || "VEHICLE_UNSPECIFIED";
            
            if (isNaN(price) || price <= 0) {
                alert("Please enter a valid purchase price.");
                return;
            }

            const krgDuty = price * KRG_DUTY_RATE;
            const totalUSD = krgDuty + ASYCUDA_FEE + FEDERAL_TRANSIT_TAX;
            const totalIQD = totalUSD * EXCHANGE_RATE;

            // Update UI
            const receiptContent = document.getElementById('receiptContent');
            receiptContent.innerHTML = `
                <div class="line-item">
                    <span class="line-label">Vehicle</span>
                    <span class="line-value">${vehicle}</span>
                </div>
                <div class="line-item">
                    <span class="line-label">KRG Duty (7%)</span>
                    <span class="line-value">$${krgDuty.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                </div>
                <div class="line-item">
                    <span class="line-label">Federal Transit Tax</span>
                    <span class="line-value">$${FEDERAL_TRANSIT_TAX.toLocaleString()}</span>
                </div>
                <div class="line-item">
                    <span class="line-label">ASYCUDA Processing</span>
                    <span class="line-value">$${ASYCUDA_FEE.toLocaleString()}</span>
                </div>
                <div style="margin-top: 2rem; font-size: 0.6rem; color: var(--neon-cyan); font-family: 'Orbitron';">
                    STATUS: VERIFIED_FOR_CLEARANCE
                </div>
            `;

            document.getElementById('totalUSD').innerText = `$${totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('totalIQD').innerText = `${totalIQD.toLocaleString()} IQD`;
            document.getElementById('totalContainer').style.display = 'block';

            // Add a little glow effect to the receipt
            const receipt = document.getElementById('receipt');
            receipt.style.borderColor = 'var(--neon-cyan)';
            receipt.style.boxShadow = '0 0 20px rgba(0, 243, 255, 0.1)';
        }
    </script>
</body>
</html>
